<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hotels - CheapCheapy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, sans-serif; margin:0; background:#f5f5f5; color:#111;">

  <!-- Header -->
  <div style="background:black; color:white; padding:24px 20px;">
    <div style="max-width:1200px; margin:auto;">
      <h1 style="margin:0; font-size:46px; font-weight:bold; letter-spacing:0.5px;">
        <span style="color:white;">Cheap</span><span style="color:#e8c93d;">Cheapy</span> ✈️
      </h1>
      <p style="margin:8px 0 0 0; font-size:20px; color:#f2f2f2;">Powered by Auchen Travel</p>
    </div>
  </div>

  <!-- Hero Image -->
  <div style="width:100%; height:420px; overflow:hidden;">
    <img src="https://images.unsplash.com/photo-1573843981267-be1999ff37cd?auto=format&fit=crop&w=1800&q=80"
         style="width:100%; height:100%; object-fit:cover; display:block;">
  </div>

  <!-- Search Panel -->
  <div style="max-width:1200px; margin:-90px auto 40px auto; position:relative; z-index:10;">

    <!-- Tabs -->
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">
      <a href="hotels.html" style="background:white; color:#111; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px; box-shadow:0 4px 10px rgba(0,0,0,0.08);">Hotels and apartments</a>
      <a href="flights.html" style="background:#efe8a7; color:#333; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px;">Air tickets</a>
      <a href="transfer.html" style="background:#efe8a7; color:#333; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px;">Transfers</a>
      <a href="trains.html" style="background:#efe8a7; color:#333; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px;">Train tickets</a>
      <a href="offers.html" style="background:#efe8a7; color:#333; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px;">Offers</a>
      <a href="contact.html" style="background:#efe8a7; color:#333; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px;">Contact</a>
      <a href="about.html" style="background:#efe8a7; color:#333; padding:16px 28px; border-radius:20px; text-decoration:none; font-size:18px;">About us</a>
    </div>

    <!-- Main Box -->
    <div style="background:#efefef; border-radius:26px; padding:28px; box-shadow:0 16px 35px rgba(0,0,0,0.14);">

      <!-- Top Row -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px;">

        <div style="flex:2; min-width:280px; background:white; border:1px solid #d6d6d6; border-radius:18px; padding:12px 16px; box-sizing:border-box;">
          <div style="font-size:14px; color:#777; margin-bottom:4px;">Destination</div>
          <input placeholder="City, hotel, resort, villa or apartment"
                 style="width:100%; border:none; outline:none; font-size:18px; background:transparent;">
        </div>

        <div style="flex:1; min-width:180px; background:white; border:1px solid #d6d6d6; border-radius:18px; padding:12px 16px; box-sizing:border-box;">
          <div style="font-size:14px; color:#777; margin-bottom:4px;">Check-in</div>
          <input type="date"
                 style="width:100%; border:none; outline:none; font-size:18px; background:transparent;">
        </div>

        <div style="flex:1; min-width:180px; background:white; border:1px solid #d6d6d6; border-radius:18px; padding:12px 16px; box-sizing:border-box;">
          <div style="font-size:14px; color:#777; margin-bottom:4px;">Check-out</div>
          <input type="date"
                 style="width:100%; border:none; outline:none; font-size:18px; background:transparent;">
        </div>

        <div style="flex:1; min-width:220px; position:relative;">
          <button type="button" onclick="toggleGuestsBox()"
                  style="width:100%; background:white; border:1px solid #d6d6d6; border-radius:18px; padding:12px 16px; box-sizing:border-box; text-align:left; cursor:pointer;">
            <div style="font-size:14px; color:#777; margin-bottom:4px;">Rooms & Guests</div>
            <div id="guestsSummary" style="font-size:18px;">1 room for 2 guests</div>
          </button>

          <div id="guestsBox"
               style="display:none; position:absolute; top:88px; left:0; width:100%; background:white; border:1px solid #ddd; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.15); padding:18px; z-index:50; box-sizing:border-box;">

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <div style="font-weight:bold;">Rooms</div>
              <div style="display:flex; gap:10px; align-items:center;">
                <button type="button" onclick="changeGuests('rooms', -1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #bbb; background:white; cursor:pointer;">-</button>
                <span id="roomsCount">1</span>
                <button type="button" onclick="changeGuests('rooms', 1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #bbb; background:white; cursor:pointer;">+</button>
              </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <div>
                <div style="font-weight:bold;">Adults</div>
                <div style="font-size:13px; color:#666;">Age 12+</div>
              </div>
              <div style="display:flex; gap:10px; align-items:center;">
                <button type="button" onclick="changeGuests('adults', -1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #bbb; background:white; cursor:pointer;">-</button>
                <span id="adultsCount">2</span>
                <button type="button" onclick="changeGuests('adults', 1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #bbb; background:white; cursor:pointer;">+</button>
              </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <div>
                <div style="font-weight:bold;">Children</div>
                <div style="font-size:13px; color:#666;">Age 0-11</div>
              </div>
              <div style="display:flex; gap:10px; align-items:center;">
                <button type="button" onclick="changeGuests('children', -1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #bbb; background:white; cursor:pointer;">-</button>
                <span id="childrenCount">0</span>
                <button type="button" onclick="changeGuests('children', 1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #bbb; background:white; cursor:pointer;">+</button>
              </div>
            </div>

            <div id="childrenAgesBox" style="display:none; margin-bottom:15px;">
              <div style="font-weight:bold; margin-bottom:10px;">Children Ages</div>
              <div id="childrenAgesWrapper" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
            </div>

            <button type="button" onclick="closeGuestsBox()"
                    style="width:100%; padding:12px; background:black; color:white; border:none; border-radius:10px; cursor:pointer;">
              Done
            </button>
          </div>
        </div>

        <button style="min-width:170px; background:#e8c93d; color:#111; border:none; border-radius:18px; font-size:18px; cursor:pointer; padding:0 24px;">
          Search
        </button>
      </div>

      <!-- Additional parameters -->
      <div style="font-size:17px; color:#777; margin-bottom:18px;">Additional parameters</div>

      <!-- Parameters Row -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px;">

        <div style="flex:3; min-width:320px; display:flex; gap:0; flex-wrap:wrap; background:white; border:1px solid #d6d6d6; border-radius:18px; overflow:hidden;">
          <button type="button" class="star-btn" onclick="selectStar(this)" style="flex:1; min-width:100px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">No stars</button>
          <button type="button" class="star-btn" onclick="selectStar(this)" style="flex:1; min-width:100px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">2 stars</button>
          <button type="button" class="star-btn" onclick="selectStar(this)" style="flex:1; min-width:100px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">3 stars</button>
          <button type="button" class="star-btn" onclick="selectStar(this)" style="flex:1; min-width:100px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">4 stars</button>
          <button type="button" class="star-btn" onclick="selectStar(this)" style="flex:1; min-width:100px; padding:18px; background:white; border:none; cursor:pointer;">5 stars</button>
        </div>

        <div style="flex:2; min-width:260px; display:flex; gap:0; flex-wrap:wrap; background:white; border:1px solid #d6d6d6; border-radius:18px; overflow:hidden;">
          <button type="button" class="meal-btn" onclick="selectMeal(this)" style="flex:1; min-width:70px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">RO</button>
          <button type="button" class="meal-btn" onclick="selectMeal(this)" style="flex:1; min-width:70px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">BB</button>
          <button type="button" class="meal-btn" onclick="selectMeal(this)" style="flex:1; min-width:70px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">HB</button>
          <button type="button" class="meal-btn" onclick="selectMeal(this)" style="flex:1; min-width:70px; padding:18px; background:white; border:none; border-right:1px solid #e3e3e3; cursor:pointer;">FB</button>
          <button type="button" class="meal-btn" onclick="selectMeal(this)" style="flex:1; min-width:70px; padding:18px; background:white; border:none; cursor:pointer;">AI</button>
        </div>
      </div>

      <!-- Bottom Row -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">

        <div style="flex:1; min-width:240px; background:white; border:1px solid #d6d6d6; border-radius:18px; padding:12px 16px; box-sizing:border-box;">
          <div style="font-size:14px; color:#777; margin-bottom:4px;">Early check-in</div>
          <select style="width:100%; border:none; outline:none; font-size:18px; background:transparent;">
            <option>Select the time</option>
            <option>06:00</option>
            <option>08:00</option>
            <option>10:00</option>
            <option>12:00</option>
          </select>
        </div>

        <div style="flex:1; min-width:240px; background:white; border:1px solid #d6d6d6; border-radius:18px; padding:12px 16px; box-sizing:border-box;">
          <div style="font-size:14px; color:#777; margin-bottom:4px;">Late check-out</div>
          <select style="width:100%; border:none; outline:none; font-size:18px; background:transparent;">
            <option>Select the time</option>
            <option>14:00</option>
            <option>16:00</option>
            <option>18:00</option>
            <option>20:00</option>
          </select>
        </div>

        <label style="min-width:220px; font-size:18px;">
          <input type="checkbox" style="transform:scale(1.2); margin-right:8px;"> Free cancellation
        </label>
      </div>

    </div>
  </div>

  <script>
    let rooms = 1;
    let adults = 2;
    let children = 0;
    let childAges = [];

    function toggleGuestsBox() {
      const box = document.getElementById('guestsBox');
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function closeGuestsBox() {
      document.getElementById('guestsBox').style.display = 'none';
    }

    function updateGuestsUI() {
      document.getElementById('roomsCount').textContent = rooms;
      document.getElementById('adultsCount').textContent = adults;
      document.getElementById('childrenCount').textContent = children;

      const totalGuests = adults + children;
      const summary = `${rooms} room${rooms > 1 ? 's' : ''} for ${totalGuests} guest${totalGuests > 1 ? 's' : ''}`;
      document.getElementById('guestsSummary').textContent = summary;

      const childrenAgesBox = document.getElementById('childrenAgesBox');
      const childrenAgesWrapper = document.getElementById('childrenAgesWrapper');

      if (children > 0) {
        childrenAgesBox.style.display = 'block';
        childrenAgesWrapper.innerHTML = '';

        while (childAges.length < children) childAges.push('1');
        while (childAges.length > children) childAges.pop();

        for (let i = 0; i < children; i++) {
          const select = document.createElement('select');
          select.style.padding = '10px';
          select.style.border = '1px solid #ccc';
          select.style.borderRadius = '8px';
          select.style.minWidth = '120px';
          select.onchange = function () {
            childAges[i] = this.value;
          };

          for (let age = 0; age <= 11; age++) {
            const option = document.createElement('option');
            option.value = age;
            option.text = `Child ${i + 1}: ${age}`;
            if (String(childAges[i]) === String(age)) option.selected = true;
            select.appendChild(option);
          }

          childrenAgesWrapper.appendChild(select);
        }
      } else {
        childrenAgesBox.style.display = 'none';
        childrenAgesWrapper.innerHTML = '';
      }
    }

    function changeGuests(type, delta) {
      let newRooms = rooms;
      let newAdults = adults;
      let newChildren = children;

      if (type === 'rooms') newRooms += delta;
      if (type === 'adults') newAdults += delta;
      if (type === 'children') newChildren += delta;

      if (newRooms < 1) return;
      if (newAdults < 1) return;
      if (newChildren < 0) return;
      if ((newAdults + newChildren) > 9) return;

      rooms = newRooms;
      adults = newAdults;
      children = newChildren;

      updateGuestsUI();
    }

    function selectStar(button) {
      const buttons = document.querySelectorAll('.star-btn');
      buttons.forEach(btn => {
        btn.style.background = 'white';
        btn.style.fontWeight = 'normal';
      });
      button.style.background = '#f3f3f3';
      button.style.fontWeight = 'bold';
    }

    function selectMeal(button) {
      const buttons = document.querySelectorAll('.meal-btn');
      buttons.forEach(btn => {
        btn.style.background = 'white';
        btn.style.fontWeight = 'normal';
      });
      button.style.background = '#f3f3f3';
      button.style.fontWeight = 'bold';
    }

    window.onload = function () {
      updateGuestsUI();
    };

    document.addEventListener('click', function(event) {
      const box = document.getElementById('guestsBox');
      if (!box) return;

      if (!box.contains(event.target) && !event.target.closest('button[onclick="toggleGuestsBox()"]')) {
        box.style.display = 'none';
      }
    });
  </script>

</body>
</html>
