<!DOCTYPE html>
<html lang="en">
<head>
  <title>Trains - CheapCheapy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, sans-serif; margin:0; background:#f5f5f5; color:#111; direction:ltr;">

  <!-- Header -->
  <div style="background:black; color:white; padding:22px 20px;">
    <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">

      <!-- Logo -->
      <div>
        <h1 style="margin:0; font-size:42px;">
          <span style="color:white;">Cheap</span><span style="color:#e8c93d;">Cheapy</span> 🚆
        </h1>
        <p data-en="Powered by Auchen Travel"
           data-ar="مقدم من Auchen Travel"
           style="margin:6px 0 0 0; font-size:16px;">
          Powered by Auchen Travel
        </p>
      </div>

      <!-- Controls -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:center;">

        <a href="about.html" data-en="About" data-ar="من نحن"
           style="color:#e8c93d; text-decoration:none; font-size:17px; font-weight:bold;">About</a>

        <a href="offers.html" data-en="Offers" data-ar="العروض"
           style="color:#e8c93d; text-decoration:none; font-size:17px; font-weight:bold;">Offers</a>

        <a href="contact.html" data-en="Contact" data-ar="اتصل بنا"
           style="color:#e8c93d; text-decoration:none; font-size:17px; font-weight:bold;">Contact</a>

        <select onchange="changeLanguage(this.value)"
                style="padding:10px; border-radius:10px; border:none;">
          <option value="en">English</option>
          <option value="ar">العربية</option>
        </select>

        <select style="padding:10px; border-radius:10px; border:none;">
          <option>AED</option>
          <option>USD</option>
          <option>EUR</option>
          <option>SAR</option>
          <option>EGP</option>
        </select>

        <a href="#"
           data-en="Login"
           data-ar="تسجيل الدخول"
           style="background:white; color:black; padding:10px 16px; border-radius:12px; text-decoration:none; font-weight:bold;">
          Login
        </a>

      </div>

    </div>
  </div>

  <!-- Hero Image -->
  <div style="width:100%; height:420px; overflow:hidden;">
    <img src="<img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1800&q=80"
     style="width:100%; height:100%; object-fit:cover;">"
        
  </div>

  <!-- Search Panel -->
  <div style="max-width:1200px; margin:-90px auto 40px auto; position:relative; z-index:10;">

    <!-- Tabs -->
    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">

      <a href="index.html" style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none;">Home</a>

      <a href="hotels.html" style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none;">Hotels</a>

      <a href="flights.html" style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none;">Flights</a>

      <a href="transfer.html" style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none;">Transfers</a>

      <a href="trains.html"
         style="background:white; padding:18px 30px; border-radius:22px; text-decoration:none; box-shadow:0 4px 10px rgba(0,0,0,0.08);">
        Trains
      </a>

    </div>

    <!-- Main Box -->
    <div style="background:#efefef; border-radius:26px; padding:28px; box-shadow:0 16px 35px rgba(0,0,0,0.14);">

      <h2 data-en="Train Tickets Search"
          data-ar="البحث عن تذاكر القطارات">
        Train Tickets Search
      </h2>

      <p data-en="Search and book train tickets بسهولة"
         data-ar="ابحث واحجز تذاكر القطارات بسهولة"
         style="font-size:18px; color:#444; margin-bottom:22px;">
        Search and book train tickets easily
      </p>

      <!-- Trip Type -->
      <div style="margin-bottom:20px;">
        <label style="margin-right:20px;">
          <input type="radio" name="tripType" checked onclick="changeTripType()">
          <span data-en="One way" data-ar="اتجاه واحد">One way</span>
        </label>

        <label>
          <input type="radio" name="tripType" onclick="changeTripType()">
          <span data-en="Round trip" data-ar="ذهاب وعودة">Round trip</span>
        </label>
      </div>

      <!-- Row -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px;">

        <div style="flex:1; min-width:220px; background:white; padding:12px 16px; border-radius:18px;">
          <div data-en="From" data-ar="من" style="font-size:14px;">From</div>
          <input placeholder="City or station" style="width:100%; border:none; outline:none;">
        </div>

        <div style="flex:1; min-width:220px; background:white; padding:12px 16px; border-radius:18px;">
          <div data-en="To" data-ar="إلى" style="font-size:14px;">To</div>
          <input placeholder="City or station" style="width:100%; border:none; outline:none;">
        </div>

        <div style="flex:1; min-width:180px; background:white; padding:12px 16px; border-radius:18px;">
          <div data-en="Departure date" data-ar="تاريخ السفر">Date</div>
          <input type="date" style="width:100%; border:none;">
        </div>

        <div id="returnBox" style="flex:1; min-width:180px; display:none;">
          <div style="background:white; padding:12px 16px; border-radius:18px;">
            <div data-en="Return date" data-ar="تاريخ العودة">Return</div>
            <input type="date" style="width:100%; border:none;">
          </div>
        </div>

      </div>

      <!-- Passengers -->
      <div style="display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px;">

        <div style="flex:1; min-width:220px; background:white; padding:12px 16px; border-radius:18px;">
          <div data-en="Passengers" data-ar="عدد الركاب">Passengers</div>
          <select style="width:100%; border:none;">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
        </div>

        <button style="min-width:220px; height:58px; background:#e8c93d; border:none; border-radius:18px; font-size:22px; font-weight:bold;">
          Search
        </button>

      </div>

    </div>
  </div>

  <script>
    function changeTripType() {
      const radios = document.getElementsByName('tripType');
      const returnBox = document.getElementById('returnBox');

      if (radios[1].checked) {
        returnBox.style.display = 'block';
      } else {
        returnBox.style.display = 'none';
      }
    }

    function changeLanguage(lang) {
      const elements = document.querySelectorAll('[data-en]');
      elements.forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
      });

      document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
    }
  </script>

</body>
</html>
