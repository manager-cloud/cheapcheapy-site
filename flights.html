<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flights - CheapCheapy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; margin:0; background:#f5f5f5;">

<!-- HEADER -->
<div style="background:black; color:white; padding:20px;">
  <h1 style="margin:0;">Cheap<span style="color:#e8c93d;">Cheapy</span> ✈️</h1>
</div>

<!-- SEARCH BOX -->
<div style="max-width:900px; margin:40px auto; background:white; padding:25px; border-radius:20px;">

<h2>Flights Search</h2>

<!-- Trip Type -->
<div style="margin-bottom:20px;">
  <label><input type="radio" name="trip" checked onclick="changeTrip('one')"> One way</label>
  <label style="margin-left:15px;"><input type="radio" name="trip" onclick="changeTrip('round')"> Round trip</label>
  <label style="margin-left:15px;"><input type="radio" name="trip" onclick="changeTrip('multi')"> Multi-city</label>
</div>

<!-- ONE WAY / ROUND -->
<div id="mainBox">

<div style="display:flex; gap:10px; margin-bottom:10px;">
  <input placeholder="From" style="flex:1; padding:10px;">
  <input placeholder="To" style="flex:1; padding:10px;">
</div>

<div style="display:flex; gap:10px; margin-bottom:10px;">
  <input type="date" style="flex:1; padding:10px;">
  <input id="returnDate" type="date" style="flex:1; padding:10px; display:none;">
</div>

<!-- Travelers -->
<div style="position:relative; margin-bottom:10px;">

  <div onclick="toggleTrav()" 
       style="border:1px solid #ccc; padding:10px; border-radius:10px; cursor:pointer;">
    <div style="font-size:12px;">Travelers</div>
    <div id="summary">1 Adult, 0 Children, 0 Infants</div>
  </div>

  <!-- BOX -->
  <div id="travBox" style="display:none; margin-top:10px; border:1px solid #ddd; border-radius:15px; padding:15px; background:#fafafa;">

    <!-- Adults -->
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <div>Adults</div>
      <div>
        <button onclick="change('adult',-1)">-</button>
        <span id="adultCount">1</span>
        <button onclick="change('adult',1)">+</button>
      </div>
    </div>

    <!-- Children -->
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <div>Children</div>
      <div>
        <button onclick="change('child',-1)">-</button>
        <span id="childCount">0</span>
        <button onclick="change('child',1)">+</button>
      </div>
    </div>

    <!-- Infants -->
    <div style="display:flex; justify-content:space-between;">
      <div>Infants</div>
      <div>
        <button onclick="change('infant',-1)">-</button>
        <span id="infantCount">0</span>
        <button onclick="change('infant',1)">+</button>
      </div>
    </div>

    <div style="font-size:12px; color:#777; margin-top:10px;">
      Max 9 (Adults + Children) / Infant per Adult
    </div>

  </div>

</div>

<button style="background:#e8c93d; padding:12px 25px; border:none; border-radius:10px;">
Search
</button>

</div>

<!-- MULTI -->
<div id="multiBox" style="display:none;">

<div id="segments">
  <div style="display:flex; gap:10px; margin-bottom:10px;">
    <input placeholder="From" style="flex:1; padding:10px;">
    <input placeholder="To" style="flex:1; padding:10px;">
    <input type="date" style="flex:1; padding:10px;">
  </div>

  <div style="display:flex; gap:10px; margin-bottom:10px;">
    <input placeholder="From" style="flex:1; padding:10px;">
    <input placeholder="To" style="flex:1; padding:10px;">
    <input type="date" style="flex:1; padding:10px;">
  </div>
</div>

<button onclick="addSeg()" style="margin-bottom:10px;">+ Add flight</button>

<!-- Travelers (same) -->
<div style="position:relative; margin-bottom:10px;">

  <div onclick="toggleTrav()" 
       style="border:1px solid #ccc; padding:10px; border-radius:10px; cursor:pointer;">
    <div style="font-size:12px;">Travelers</div>
    <div id="summary2">1 Adult, 0 Children, 0 Infants</div>
  </div>

</div>

<button style="background:#e8c93d; padding:12px 25px; border:none; border-radius:10px;">
Search
</button>

</div>

</div>

<script>

let adults=1, children=0, infants=0;

function toggleTrav(){
  let box=document.getElementById("travBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

function update(){
  document.getElementById("adultCount").innerText=adults;
  document.getElementById("childCount").innerText=children;
  document.getElementById("infantCount").innerText=infants;

  let text=`${adults} Adult, ${children} Children, ${infants} Infants`;

  document.getElementById("summary").innerText=text;
  let s2=document.getElementById("summary2");
  if(s2) s2.innerText=text;
}

function change(type,val){

  if(type==="adult"){
    if(adults+val<1) return;
    if(adults+children+val>9) return;
    adults+=val;
  }

  if(type==="child"){
    if(children+val<0) return;
    if(adults+children+val>9) return;
    children+=val;
  }

  if(type==="infant"){
    if(infants+val<0) return;
    if(infants+val>adults) return;
    infants+=val;
  }

  update();
}

function changeTrip(type){
  document.getElementById("mainBox").style.display = (type==="multi")?"none":"block";
  document.getElementById("multiBox").style.display = (type==="multi")?"block":"none";
  document.getElementById("returnDate").style.display = (type==="round")?"block":"none";
}

function addSeg(){
  let div=document.createElement("div");
  div.style.display="flex";
  div.style.gap="10px";
  div.style.marginBottom="10px";

  div.innerHTML=`
    <input placeholder="From" style="flex:1; padding:10px;">
    <input placeholder="To" style="flex:1; padding:10px;">
    <input type="date" style="flex:1; padding:10px;">
  `;

  document.getElementById("segments").appendChild(div);
}

update();

</script>

</body>
</html>
