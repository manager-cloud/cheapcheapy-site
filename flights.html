<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flights - CheapCheapy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, sans-serif; margin:0; background:#f5f5f5; color:#111;">

  <!-- Header -->
  <div style="background:black; color:white; padding:20px;">
    <div style="max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
      <div>
        <h1 style="margin:0;">CheapCheapy ✈️</h1>
        <p style="margin:5px 0 0 0;">Powered by Auchen Travel</p>
      </div>

      <div style="margin-top:10px;">
        <a href="index.html" style="color:white; margin-right:15px; text-decoration:none;">Home</a>
        <a href="about.html" style="color:white; margin-right:15px; text-decoration:none;">About</a>
        <a href="flights.html" style="color:white; margin-right:15px; text-decoration:none;">Flights</a>
        <a href="hotels.html" style="color:white; margin-right:15px; text-decoration:none;">Hotels</a>
        <a href="trains.html" style="color:white; margin-right:15px; text-decoration:none;">Trains</a>
        <a href="transfer.html" style="color:white; margin-right:15px; text-decoration:none;">Transfer</a>
        <a href="offers.html" style="color:white; margin-right:15px; text-decoration:none;">Offers</a>
        <a href="contact.html" style="color:white; text-decoration:none;">Contact</a>
      </div>
    </div>
  </div>

  <!-- Hero Image -->
  <div style="width:100%; height:350px; overflow:hidden;">
    <img src="https://images.unsplash.com/photo-1599143139820-7d6fbef4f189?q=80&w=1600&auto=format&fit=crop"
         style="width:100%; height:100%; object-fit:cover; display:block;">
  </div>

  <!-- Search Box -->
  <div style="max-width:1100px; margin:-80px auto 40px auto; background:white; padding:25px; border-radius:18px; box-shadow:0 12px 30px rgba(0,0,0,0.15); position:relative; z-index:10;">

    <h2 style="margin-top:0;">Flights Search</h2>
    <p style="color:#555; margin-bottom:20px;">Search and compare global flight options.</p>

    <!-- Trip Type -->
    <div style="margin-bottom:20px;">
      <label style="margin-right:20px;">
        <input type="radio" name="tripType" value="oneway" checked onclick="changeTripType()"> One way
      </label>
      <label style="margin-right:20px;">
        <input type="radio" name="tripType" value="roundtrip" onclick="changeTripType()"> Round trip
      </label>
      <label>
        <input type="radio" name="tripType" value="multicity" onclick="changeTripType()"> Multi-city
      </label>
    </div>

    <!-- Main Search Fields -->
    <div id="mainSearchBox">
      <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
        <input placeholder="From"
               style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        <input placeholder="To"
               style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
      </div>

      <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
        <input type="date"
               style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">

        <div id="returnDateBox" style="flex:1; min-width:200px; display:none;">
          <input type="date"
                 style="width:100%; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        </div>
      </div>

      <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px; align-items:flex-start;">
        <!-- Travelers Selector -->
        <div style="flex:1; min-width:260px; position:relative;">
          <button type="button" onclick="toggleTravelersBox()"
                  style="width:100%; padding:14px; border:1px solid #ccc; border-radius:10px; background:white; text-align:left; box-sizing:border-box; cursor:pointer;">
            <span id="travelersSummary">1 Adult, 0 Children, 0 Infants</span>
          </button>

          <div id="travelersBox"
               style="display:none; position:absolute; top:58px; left:0; width:100%; background:white; border:1px solid #ddd; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.12); padding:18px; z-index:50; box-sizing:border-box;">

            <!-- Adults -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <div>
                <div style="font-weight:bold;">Adults</div>
                <div style="font-size:13px; color:#666;">Age 12+</div>
              </div>
              <div style="display:flex; align-items:center; gap:10px;">
                <button type="button" onclick="changeTravelers('adults', -1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #ccc; background:white; cursor:pointer;">-</button>
                <span id="adultsCount" style="min-width:20px; text-align:center;">1</span>
                <button type="button" onclick="changeTravelers('adults', 1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #ccc; background:white; cursor:pointer;">+</button>
              </div>
            </div>

            <!-- Children -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <div>
                <div style="font-weight:bold;">Children</div>
                <div style="font-size:13px; color:#666;">Age 2-11</div>
              </div>
              <div style="display:flex; align-items:center; gap:10px;">
                <button type="button" onclick="changeTravelers('children', -1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #ccc; background:white; cursor:pointer;">-</button>
                <span id="childrenCount" style="min-width:20px; text-align:center;">0</span>
                <button type="button" onclick="changeTravelers('children', 1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #ccc; background:white; cursor:pointer;">+</button>
              </div>
            </div>

            <!-- Infants -->
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
              <div>
                <div style="font-weight:bold;">Infants</div>
                <div style="font-size:13px; color:#666;">Under 2</div>
              </div>
              <div style="display:flex; align-items:center; gap:10px;">
                <button type="button" onclick="changeTravelers('infants', -1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #ccc; background:white; cursor:pointer;">-</button>
                <span id="infantsCount" style="min-width:20px; text-align:center;">0</span>
                <button type="button" onclick="changeTravelers('infants', 1)" style="width:32px; height:32px; border-radius:50%; border:1px solid #ccc; background:white; cursor:pointer;">+</button>
              </div>
            </div>

            <div style="font-size:13px; color:#777; margin-bottom:15px;">
              Maximum adults + children: 9. Infants cannot exceed adults.
            </div>

            <button type="button" onclick="closeTravelersBox()"
                    style="width:100%; padding:12px; background:black; color:white; border:none; border-radius:10px; cursor:pointer;">
              Done
            </button>
          </div>
        </div>

        <!-- Cabin -->
        <select style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <option>Economy</option>
          <option>Premium Economy</option>
          <option>Business</option>
          <option>First</option>
        </select>
      </div>

      <div style="margin-bottom:20px;">
        <label>
          <input type="checkbox"> Direct flights only
        </label>
      </div>
    </div>

    <!-- Multi-city Box -->
    <div id="multiCityBox" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid #eee;">
      <h3 style="margin-top:0;">Multi-city Trips</h3>

      <div id="segmentsWrapper">
        <div class="segment" style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px; align-items:center;">
          <input placeholder="From"
                 style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <input placeholder="To"
                 style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <input type="date"
                 style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <button type="button" onclick="removeSegment(this)"
                  style="padding:10px 14px; background:#ff4d4d; color:white; border:none; border-radius:8px; cursor:pointer;">
            ✕
          </button>
        </div>

        <div class="segment" style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px; align-items:center;">
          <input placeholder="From"
                 style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <input placeholder="To"
                 style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <input type="date"
                 style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <button type="button" onclick="removeSegment(this)"
                  style="padding:10px 14px; background:#ff4d4d; color:white; border:none; border-radius:8px; cursor:pointer;">
            ✕
          </button>
        </div>
      </div>

      <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px; align-items:flex-start;">
        <div style="flex:1; min-width:260px; position:relative;">
          <button type="button" onclick="toggleTravelersBox()"
                  style="width:100%; padding:14px; border:1px solid #ccc; border-radius:10px; background:white; text-align:left; box-sizing:border-box; cursor:pointer;">
            <span id="travelersSummaryMulti">1 Adult, 0 Children, 0 Infants</span>
          </button>
        </div>

        <select style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
          <option>Economy</option>
          <option>Premium Economy</option>
          <option>Business</option>
          <option>First</option>
        </select>
      </div>

      <button type="button"
              onclick="addSegment()"
              style="padding:12px 20px; background:#f3f3f3; color:#111; border:1px solid #ccc; border-radius:10px; font-size:15px; cursor:pointer; margin-bottom:20px;">
        Add another flight
      </button>
    </div>

    <div style="margin-top:25px;">
      <button style="padding:14px 28px; background:black; color:white; border:none; border-radius:10px; font-size:16px; cursor:pointer;">
        Search Flights
      </button>
    </div>
  </div>

  <script>
    let adults = 1;
    let children = 0;
    let infants = 0;

    function changeTripType() {
      const selected = document.querySelector('input[name="tripType"]:checked').value;
      const returnDateBox = document.getElementById('returnDateBox');
      const multiCityBox = document.getElementById('multiCityBox');
      const mainSearchBox = document.getElementById('mainSearchBox');

      if (selected === 'oneway') {
        returnDateBox.style.display = 'none';
        multiCityBox.style.display = 'none';
        mainSearchBox.style.display = 'block';
      } else if (selected === 'roundtrip') {
        returnDateBox.style.display = 'block';
        multiCityBox.style.display = 'none';
        mainSearchBox.style.display = 'block';
      } else if (selected === 'multicity') {
        returnDateBox.style.display = 'none';
        multiCityBox.style.display = 'block';
        mainSearchBox.style.display = 'none';
      }
    }

    function toggleTravelersBox() {
      const box = document.getElementById('travelersBox');
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function closeTravelersBox() {
      document.getElementById('travelersBox').style.display = 'none';
    }

    function updateTravelersUI() {
      document.getElementById('adultsCount').textContent = adults;
      document.getElementById('childrenCount').textContent = children;
      document.getElementById('infantsCount').textContent = infants;

      const summary = `${adults} Adult${adults > 1 ? 's' : ''}, ${children} Child${children === 1 ? '' : 'ren'}, ${infants} Infant${infants > 1 ? 's' : ''}`;
      document.getElementById('travelersSummary').textContent = summary;

      const multi = document.getElementById('travelersSummaryMulti');
      if (multi) multi.textContent = summary;
    }

    function changeTravelers(type, delta) {
      let newAdults = adults;
      let newChildren = children;
      let newInfants = infants;

      if (type === 'adults') newAdults += delta;
      if (type === 'children') newChildren += delta;
      if (type === 'infants') newInfants += delta;

      if (newAdults < 1) return;
      if (newChildren < 0) return;
      if (newInfants < 0) return;
      if ((newAdults + newChildren) > 9) return;
      if (newInfants > newAdults) return;

      adults = newAdults;
      children = newChildren;
      infants = newInfants;

      updateTravelersUI();
    }

    function addSegment() {
      const wrapper = document.getElementById('segmentsWrapper');

      const segment = document.createElement('div');
      segment.className = 'segment';
      segment.style.display = 'flex';
      segment.style.gap = '15px';
      segment.style.flexWrap = 'wrap';
      segment.style.marginBottom = '15px';
      segment.style.alignItems = 'center';

      segment.innerHTML = `
        <input placeholder="From"
               style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        <input placeholder="To"
               style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        <input type="date"
               style="flex:1; min-width:180px; padding:14px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box;">
        <button type="button" onclick="removeSegment(this)"
                style="padding:10px 14px; background:#ff4d4d; color:white; border:none; border-radius:8px; cursor:pointer;">
          ✕
        </button>
      `;

      wrapper.appendChild(segment);
    }

    function removeSegment(button) {
      const wrapper = document.getElementById('segmentsWrapper');

      if (wrapper.children.length <= 2) {
        alert("At least 2 flights are required.");
        return;
      }

      const segment = button.parentElement;
      segment.remove();
    }

    window.onload = function () {
      changeTripType();
      updateTravelersUI();
    };

    document.addEventListener('click', function(event) {
      const box = document.getElementById('travelersBox');
      if (!box) return;

      if (!box.contains(event.target) && !event.target.closest('button[onclick="toggleTravelersBox()"]')) {
        box.style.display = 'none';
      }
    });
  </script>

</body>
</html>
