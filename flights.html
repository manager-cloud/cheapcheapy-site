<body style="font-family: Arial; margin:0; background:#f5f5f5;">
<div style="background:black; color:white; padding:20px;">
  <div style="max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
    <div>
      <h1 style="margin:0;">CheapCheapy ✈️</h1>
      <p style="margin:5px 0 0 0;">Powered by Auchen Travel</p>
    </div>

    <div style="margin-top:10px;">
      <a href="index.html" style="color:white; margin-right:15px;">Home</a>
      <a href="about.html" style="color:white; margin-right:15px;">About</a>
      <a href="flights.html" style="color:white; margin-right:15px;">Flights</a>
      <a href="hotels.html" style="color:white; margin-right:15px;">Hotels</a>
      <a href="trains.html" style="color:white; margin-right:15px;">Trains</a>
      <a href="transfer.html" style="color:white; margin-right:15px;">Transfer</a>
      <a href="offers.html" style="color:white; margin-right:15px;">Offers</a>
      <a href="contact.html" style="color:white;">Contact</a>
    </div>

</div>
  <div style="background:black; color:white; padding:20px; text-align:center;">
   
<div style="width:100%; height:350px; overflow:hidden;">

  <img src="https://images.unsplash.com/photo-1599143139820-7d6fbef4f189?q=80&w=1172&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
       style="width:100%; height:100%; object-fit:cover">

</div>

  <div style="max-width:900px; margin:auto; padding:40px;">
    <h2>Flights Search</h2>

    <p>Search and compare global flight options.</p>

    <div style="max-width:1100px; margin:-60px auto 40px auto; background:white; padding:25px; border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,0.12); position:relative;">
  
  <div style="margin-bottom:20px;">
    <label style="margin-right:20px;">
      <input type="radio" name="tripType" checked> One way
    </label>
    <label style="margin-right:20px;">
      <input type="radio" name="tripType"> Round trip
    </label>
    <label>
      <input type="radio" name="tripType"> Multi-city
    </label>
  </div>

  <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
    <input placeholder="From" style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px;">
    <input placeholder="To" style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px;">
  </div>

  <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
    <input type="date" style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px;">
    <input type="date" style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px;">
  </div>

  <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:15px;">
    <input placeholder="1 Adult" style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px;">
    
    <select style="flex:1; min-width:200px; padding:14px; border:1px solid #ccc; border-radius:10px;">
      <option>Economy</option>
      <option>Premium Economy</option>
      <option>Business</option>
      <option>First</option>
    </select>
  </div>

  <div style="margin-bottom:20px;">
    <label>
      <input type="checkbox"> Direct flights only
    </label>
  </div>

  <button style="padding:14px 28px; background:black; color:white; border:none; border-radius:10px; font-size:16px;">
    Search Flights
  </button>
</div>

</body>
</html>
