<!DOCTYPE html>
<html lang="en">
<head>
  <title>CheapCheapy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, sans-serif; margin:0; background:#f5f5f5; color:#111; direction:ltr;">

  <!-- Header -->
  <div style="background:black; color:white; padding:22px 20px;">
    <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">

      <!-- Logo -->
      <div>
        <h1 style="margin:0; font-size:42px;">
          <span style="color:white;">Cheap</span><span style="color:#e8c93d;">Cheapy</span> ✈️
        </h1>
        <p data-en="Powered by Auchen Travel"
           data-ar="مقدم من Auchen Travel"
           style="margin:6px 0 0 0; font-size:16px;">
          Powered by Auchen Travel
        </p>
      </div>

      <!-- Top Right -->
      <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">

        <!-- Top links -->
        <a href="about.html" style="color:white; text-decoration:none; font-size:15px;">About</a>
        <a href="offers.html" style="color:white; text-decoration:none; font-size:15px;">Offers</a>
        <a href="contact.html" style="color:white; text-decoration:none; font-size:15px;">Contact</a>

        <!-- Language -->
        <select onchange="changeLanguage(this.value)"
                style="padding:8px; border-radius:10px; border:none;">
          <option value="en">EN</option>
          <option value="ar">AR</option>
        </select>

        <!-- Currency -->
        <select style="padding:8px; border-radius:10px; border:none;">
          <option>AED</option>
          <option>USD</option>
          <option>EUR</option>
          <option>SAR</option>
          <option>EGP</option>
        </select>

        <!-- Login -->
        <a href="#" style="background:white; color:black; padding:8px 14px; border-radius:10px; text-decoration:none; font-weight:bold;">
          Login
        </a>

      </div>

    </div>
  </div>

  <!-- Hero -->
  <div style="width:100%; height:420px; overflow:hidden;">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1800&q=80"
         style="width:100%; height:100%; object-fit:cover;">
  </div>

  <!-- Content -->
  <div style="max-width:1200px; margin:-90px auto 40px auto;">

    <!-- Tabs (محركات البحث بس) -->
    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;">

      <a href="index.html"
         style="background:white; padding:18px 30px; border-radius:22px; text-decoration:none; color:black; font-size:19px;">
        Home
      </a>

      <a href="hotels.html"
         style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none; color:black; font-size:19px;">
        Hotels
      </a>

      <a href="flights.html"
         style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none; color:black; font-size:19px;">
        Flights
      </a>

      <a href="transfer.html"
         style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none; color:black; font-size:19px;">
        Transfers
      </a>

      <a href="trains.html"
         style="background:#efe8a7; padding:18px 30px; border-radius:22px; text-decoration:none; color:black; font-size:19px;">
        Trains
      </a>

    </div>

    <!-- Main Box -->
    <div style="background:#efefef; padding:30px; border-radius:26px;">

      <h2 data-en="Your smart travel platform"
          data-ar="منصة السفر الذكية الخاصة بك">
        Your smart travel platform
      </h2>

      <p data-en="Search flights, hotels, trains, and transfers in one place."
         data-ar="ابحث عن الرحلات والفنادق والقطارات وخدمات النقل في مكان واحد."
         style="font-size:18px; color:#444;">
        Search flights, hotels, trains, and transfers in one place.
      </p>

    </div>

  </div>

  <script>
    function changeLanguage(lang) {
      const elements = document.querySelectorAll('[data-en]');
      elements.forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
      });

      document.body.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
    }
  </script>

</body>
</html>
